name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  editmode:
    name: Edit mode tests
    runs-on: ubuntu-latest
    env:
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
    steps:
      - name: Check Unity credentials are configured
        id: gate
        run: |
          if [ -z "$UNITY_EMAIL" ]; then
            echo "Unity credentials not configured; skipping test run."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.configured == 'true'
        with:
          lfs: false

      - uses: actions/cache@v4
        if: steps.gate.outputs.configured == 'true'
        with:
          path: Library
          key: Library-2019.2.9f1
          restore-keys: Library-

      - uses: game-ci/unity-test-runner@v4
        if: steps.gate.outputs.configured == 'true'
        with:
          unityVersion: 2019.2.9f1
          testMode: editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
